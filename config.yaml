# Clipmaker.ai settings. Edit freely — restart the app to apply.

paths:
  data_dir: data            # vods/, clips/, work/, app.db all live here

ingest:
  download_chat: true       # also pull Twitch chat for VOD URLs

transcribe:
  model: large-v3           # faster-whisper model (large-v3 = best, fits in 24GB)
  language: ru              # stream is mostly Russian
  device: cuda
  compute_type: float16     # fast + accurate on a 3090
  batched: true             # BatchedInferencePipeline — much faster on multi-hour VODs
  batch_size: 16            # lower this if you hit VRAM limits during transcription

clips:
  min_seconds: 15
  max_seconds: 45

# Which kinds of moments to look for, most important first.
# Weights bias the ranking when many candidates compete.
priority:
  funny_interaction: 1.0    # teammates / jokes / chat / friends / hard laughing / talking to chat
  irl_interruption: 0.95    # screams loud -> parents/family walk in & react (viral gold)
  big_reaction: 0.8
  ace: 0.6
  clutch: 0.5
  multikill_deagle: 0.55    # 3-4 headshot deagle strings etc.

llm:
  model: qwen3:30b          # local Ollama model (MoE, 256K ctx) that reads the transcript
  host: http://localhost:11434
  num_ctx: 16384            # context tokens per request (KV cache must fit in spare VRAM)
  chunk_minutes: 10         # analyze the transcript in windows of this many minutes
  overlap_seconds: 45       # overlap between windows so moments on a boundary aren't lost
  think: false              # qwen3 reasoning mode off -> faster, clean JSON for extraction

# Extra moment signals layered on top of the transcript brain.
signals:
  # Vision gate: a local vision model WATCHES each candidate moment and keeps only the
  # genuinely entertaining ones (this is what stops context-free "clips of nothing").
  vision:
    enabled: true
    model: qwen2.5vl:7b       # local Ollama vision model (pulled via setup)
    frames_per_clip: 8        # frames sampled across each candidate (also used to pick the cut)
    min_score: 0.55           # gate; raise toward 0.7 for fewer/stronger clips, lower for more
    max_verify: 24            # cap how many candidates we run the vision model on per VOD
  audio:
    enabled: true             # find loudness/excitement spikes (screams, hype, hard laughing)
    corroborate_boost: 1.2    # multiply a clip's score when a loud reaction overlaps it
    min_reaction_level: 2.5   # a spike this many× louder than baseline becomes a candidate
    max_new_candidates: 18    # propose generously; the vision gate filters out the weak ones
  chat:
    enabled: true             # Twitch chat message-velocity + emote spikes (VOD URLs only)
    corroborate_boost: 1.2
    min_burst_level: 3.0      # messages/sec this many× the median can become its own clip
    max_new_candidates: 4
  killfeed:
    enabled: false            # CS2 kill-feed detection — TUNE on your own full-res HUD first
    sample_fps: 4.0           # frames/sec to scan (higher = more accurate, slower)
    roi: {x: 0.55, y: 0.02, w: 0.44, h: 0.28}  # kill-feed region as fractions of the frame
    row_min_frac: 0.06        # min fraction of bright pixels for a row to count
    multikill_rows: 3         # rows appearing within window_seconds = a multi-kill
    ace_rows: 5               # this many = an ace
    window_seconds: 6.0       # how fast the kills must land to count as one sequence
    templates_dir: data/killfeed_templates  # drop weapon-icon PNGs here to confirm kills

edit:
  subtitles: false          # OFF — Renyan-style clips have no running captions
  subtitle_font: Bahnschrift # nicer modern condensed font (Cyrillic-capable); see editplan.py FONTS
  reframe_mode: facecam_top  # facecam_top (cam on top + gameplay below), fill_crop, or fit_blur
  reframe_zoom: 1.0
  zoom_punch_ins: false     # no blind auto-zooms; the vision pass decides emphasis instead
  speed_ramps: true
  sound_effects: true
  killfeed_highlights: true
  intro_hook: true
  # Streamer webcam location in the source (fractions of the frame). Auto-detected per
  # job when possible; these are the fallback/defaults (Renyan = top-left).
  facecam:
    present: true
    x: 0.0
    y: 0.0
    w: 0.21
    h: 0.26
    band: 0.34              # share of the vertical clip the cam occupies on top

review:
  hands_off: false          # true = skip review queue, auto-publish everything

publish:
  auto_on_approve: true       # when you approve a clip, publish it to enabled platforms
  secrets_dir: secrets        # holds client_secret.json + saved tokens (git-ignored)
  youtube:
    enabled: false            # set true after following SETUP_PUBLISHING.md
    privacy: private          # private | unlisted | public (start private to be safe)
    category_id: "20"         # 20 = Gaming
    title_suffix: " #Shorts"  # appended so YouTube treats the upload as a Short
    description: "Auto-clipped from my Twitch stream. twitch.tv/"
    tags: ["cs2", "counterstrike", "shorts", "twitch", "кс2"]
  tiktok:
    enabled: false            # requires a TikTok developer app (see SETUP_PUBLISHING.md)
    mode: draft               # 'draft' = push to your TikTok inbox/drafts; you tap Post

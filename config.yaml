# Clipmaker.ai settings. Edit freely — restart the app to apply.

streamer:
  ign: "noobs lives matter"  # your CS2 in-game name — lets the AI spot YOUR kills in the feed

paths:
  data_dir: data            # vods/, clips/, work/, app.db all live here

ingest:
  download_chat: true       # also pull Twitch chat for VOD URLs
  # YouTube often bot-gates downloads ("Sign in to confirm you're not a bot"). Passing your
  # logged-in cookies bypasses it. Set cookies_from_browser to the browser you watch YouTube
  # in: chrome | edge | firefox | brave | opera | vivaldi  (leave "" to disable). The browser
  # may need to be closed for yt-dlp to read its cookie database.
  cookies_from_browser: "brave"
  # Or point at an exported cookies.txt (Netscape format); takes precedence when set.
  # (git-ignored; export via the "Get cookies.txt LOCALLY" browser extension.)
  cookies_file: "assets/cookies.txt"
  # Solve YouTube's JS "n challenge" so 1080p downloads at full speed (else it's throttled
  # to ~tens of KiB/s, or only storyboards are offered). Needs node (present) + yt-dlp's EJS
  # solver, FETCHED+RUN from GitHub — external code, so this is opt-in. Set false to disable.
  youtube_challenge_solver: true

transcribe:
  model: large-v3           # faster-whisper model (large-v3 = best, fits in 24GB)
  language: auto            # auto = detect per VOD (EN vod -> EN titles, RU -> RU). Force with e.g. "ru".
  device: cuda
  compute_type: float16     # fast + accurate on a 3090
  batched: true             # BatchedInferencePipeline — much faster on multi-hour VODs
  batch_size: 16            # lower this if you hit VRAM limits during transcription

clips:
  min_seconds: 15
  max_seconds: 45

# Editorial priority — the order the AI is told to favour (this intent lives in the
# vision/transcript prompts). NOTE: these numbers are no longer used as score multipliers;
# the AI now sets the score itself (the vision gate's score is authoritative). Kept here as
# a readable statement of intent.
priority:
  funny_interaction: 1.0    # teammates / jokes / chat / friends / hard laughing / talking to chat
  irl_interruption: 0.95    # screams loud -> parents/family walk in & react (viral gold)
  big_reaction: 0.8
  ace: 0.6
  clutch: 0.5
  multikill_deagle: 0.55    # 3-4 headshot deagle strings etc.

llm:
  provider: anthropic       # ollama (local, free) | anthropic (Claude API, paid, best picks)
  model: qwen3:30b          # local Ollama model (used only when provider: ollama)
  host: http://localhost:11434
  num_ctx: 16384            # context tokens per request (only used by the ollama provider)
  chunk_minutes: 10         # analyze the transcript in windows of this many minutes
  overlap_seconds: 45       # overlap between windows so moments on a boundary aren't lost
  think: false              # qwen3 reasoning mode off -> faster, clean JSON (ollama only)
  anthropic:                # used only when provider: anthropic
    # Pick any current Claude model: claude-opus-4-8 (top judgment) |
    # claude-sonnet-4-6 (cheaper/faster) | claude-haiku-4-5 (cheapest). Transcript work is
    # cheap on tokens, so sonnet gives near-opus picks at a fraction of the cost.
    model: claude-sonnet-4-6
    # API key: put ANTHROPIC_API_KEY in a .env at the repo root (or set the env var)

# Extra moment signals layered on top of the transcript brain.
signals:
  # Vision gate: a local vision model WATCHES each candidate moment and keeps only the
  # genuinely entertaining ones (this is what stops context-free "clips of nothing").
  vision:
    enabled: true
    provider: anthropic       # ollama (local, free) | anthropic (Claude API, paid, best judgment)
    model: qwen2.5vl:7b       # local vision model (32b vision won't fit the 3090's 24GB)
    # used only when provider: anthropic. This call dominates API cost (frames x candidates),
    # so if you want to economise, drop frames_per_clip or use claude-sonnet-4-6 here.
    anthropic_model: claude-opus-4-8
    frames_per_clip: 8        # frames sampled across each candidate (also used to pick the cut)
    min_score: 0.45           # gate; raise toward 0.7 for fewer/stronger clips, lower for more
    max_verify: 24            # cap how many candidates we run the vision model on per VOD
  audio:
    enabled: true             # find loudness/excitement spikes (screams, hype, hard laughing)
    corroborate_boost: 1.2    # (unused — the AI sets the score now; kept for reference)
    min_reaction_level: 2.5   # a spike this many× louder than baseline becomes a candidate
    max_new_candidates: 18    # propose generously; the vision gate filters out the weak ones
  chat:
    enabled: true             # Twitch chat message-velocity + emote spikes (VOD URLs only)
    corroborate_boost: 1.2    # (unused — the AI sets the score now; kept for reference)
    min_burst_level: 3.0      # messages/sec this many× the median can become its own clip
    max_new_candidates: 4
  killfeed:
    enabled: true             # CS2 kill-feed activity detection (candidate source; vision judges)
    sample_fps: 4.0           # frames/sec to scan (higher = more accurate, slower)
    # Top-right kill-feed box as fractions of the frame (excludes the top-centre scoreboard).
    # Calibrated on his 1080p FACEIT HUD; widen `w`/lower `x` if long (assist) rows clip.
    roi: {x: 0.70, y: 0.06, w: 0.30, h: 0.26}
    # Activity = density of coloured kill-feed text edges (robust to bright sky/walls). Idle
    # runs ~0.003, a kill burst ~0.04-0.10. A window counts when activity exceeds BOTH:
    min_activity: 0.025       # absolute floor (no real feed text below this)
    spike_factor: 4.0         # ...and this many× the per-VOD baseline median
    window_seconds: 4.0       # min gap between separate activity spikes
    max_candidates: 14        # cap kill-feed candidate windows (the vision gate filters them)
    his_highlight:            # float HIS OWN kills above kills his teammates got
      enabled: true           # detect CS2's red outline on the local player's own kill rows
      boost: 1.6              # multiply a window's rank score when his own (red) kills show
      involve_floor: 0.003    # red-pixel fraction in the ROI that counts as "his own kill"

# Background music bed the AI picks by mood (downloaded via download_music.py). The track
# plays quietly UNDER the clip and auto-ducks whenever his voice gets loud (rages/hype),
# returning when he calms. calm = boring/low-action AND rage clips; hype = many kills/plays.
music:
  enabled: true
  dir: assets/music
  volume: 0.12              # background level (low — under the clip audio, but audible)
  duck_ratio: 12            # how hard the music ducks under his voice (higher = more)
  skip_if_present: true     # if the SOURCE already has music playing in a clip, add no bed (no double music)
  source_detect_strength: 0.32  # beat-detection threshold for "source has music" (0..1; lower = more sensitive)
  tracks:
    calm: calm.mp3          # Oblivion - Harvest Dawn
    hype: hype.mp3          # high-energy track for big plays

# Subscribe-animation overlay (a .mov with alpha + sound) dropped onto every clip, under the
# watermark, a couple seconds in. Plays once, then disappears.
subscribe:
  enabled: true
  file: "assets/subscribe MOV.mov"
  volume: 0.5               # its audio level (0..1) — 50%
  start: 2.5                # seconds into the clip before it appears
  scale: 0.6               # cropped-button width as a fraction of the clip width
  gap: 24                  # px gap below the watermark
  # The .mov has a small button inside a big transparent canvas — crop to the button so it
  # isn't scaled to nothing (fractions of the source). Set to x:0 y:0 w:1 h:1 for no crop.
  content_crop: {x: 0.31, y: 0.49, w: 0.38, h: 0.43}

edit:
  subtitles: false          # OFF — Renyan-style clips have no running captions
  subtitle_font: Nata Sans Medium  # bundled, self-contained (Cyrillic-OK). "Bahnschrift" = condensed system font; see editplan.py FONTS for all options
  reframe_mode: facecam_top  # facecam_top (cam on top + gameplay below), fill_crop, or fit_blur
  reframe_zoom: 1.0
  gameplay_mid: 0.5          # no-cam layout: share of the height the SHARP gameplay takes
                             # (bigger = more zoomed-in gameplay, thinner top/bottom blur bands)
  zoom_punch_ins: false     # no blind auto-zooms; the vision pass decides emphasis instead
  speed_ramps: true
  killfeed_highlights: true
  intro_hook: true
  hook_font: Nata Sans SemiBold   # on-screen title font (bundled in assets/fonts, Cyrillic-OK)
  hook_color: "#FFD400"     # title colour — yellow
  hook_persist: true        # keep the title on screen for the whole clip (not just the intro)
  watermark:
    enabled: true
    image: assets/watermark.png   # regenerate/replace via: python make_watermark.py <nickname>
    opacity: 0.5              # 0..1
    scale: 0.30              # watermark width as a fraction of the clip width
  # Streamer webcam: auto-detected as a LIVE face (a static photo over the radar is ignored)
  # and located per-VOD AND per-clip (layouts can shift between segments). A clip with no live
  # cam falls back to the no-cam gameplay layout. The rect below is only the last-resort fallback.
  facecam_per_clip: true     # detect the cam within each clip's window (handles varied VODs)
  facecam:
    present: true
    x: 0.0
    y: 0.0
    w: 0.21
    h: 0.26
    band: 0.34              # share of the vertical clip the cam occupies on top

review:
  hands_off: false          # true = skip review queue, auto-publish everything

publish:
  auto_on_approve: true       # when you approve a clip, publish it to enabled platforms
  secrets_dir: secrets        # holds client_secret.json + saved tokens (git-ignored)
  youtube:
    enabled: false            # set true after following SETUP_PUBLISHING.md
    privacy: private          # private | unlisted | public (start private to be safe)
    category_id: "20"         # 20 = Gaming
    title_suffix: " #Shorts"  # appended so YouTube treats the upload as a Short
    description: "Auto-clipped from my Twitch stream. twitch.tv/"
    tags: ["cs2", "counterstrike", "shorts", "twitch", "кс2"]
  tiktok:
    enabled: false            # requires a TikTok developer app (see SETUP_PUBLISHING.md)
    mode: draft               # 'draft' = push to your TikTok inbox/drafts; you tap Post
